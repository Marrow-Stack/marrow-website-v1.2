name: Jules Deep Review & DocGen

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  # Allows you to manually trigger a review from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  jules-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: jules-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Jules Deep System Audit
        uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          # Path to your org-wide rules we discussed
          rules_file: ".github/AGENTS.md"
          # Detailed instructions for the "Big PR" context
          extra_instructions: |
            1. Perform a deep logic audit of this PR. 
            2. If new components or systems are detected, you MUST generate a technical specification file in `./docs/`.
            3. Use Mermaid.js syntax for all architecture diagrams as per our AGENTS.md template.
            4. If existing features are modified, update the corresponding file in `./docs/` or the local block's Readme.md.
            5. Audit for Web3 security: Check for MEV-resistance and Solana/SVM performance bottlenecks.
            6. Flag findings with severity tags: [BLOCKING], [WARN], or [NIT].

      - name: Check for Documentation Updates
        # This step ensures that if Jules suggested doc changes, they are applied
        if: success()
        run: |
          echo "Jules review complete. If Jules suggested code changes for documentation, please approve his suggested commits."


          - name: Jules Deep System Audit
        uses: samarth/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # <--- ADD THIS LINE
