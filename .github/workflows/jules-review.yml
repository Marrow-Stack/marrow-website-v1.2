name: Jules Deep Review & DocGen

on:
  pull_request:
    types: [opened, synchronize] # Only use events the Action actually supports

permissions:
  contents: write
  pull-requests: write

jobs:
  jules-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Jules Deep System Audit
        uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          rules_file: "AGENTS.md"
          extra_instructions: |
            1. Audit tactile UI components and HSL color usage.
            2. Generate architecture diagrams in ./docs/ using Mermaid.js.
            3. Verify Bun/React 19 compatibility.